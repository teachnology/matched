name: ruff

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true

      # No project Python setup needed: uvx runs ruff as a standalone tool,
      # independent of .python-version.
      - name: Ruff check
        run: uvx ruff check --output-format=github .

      - name: Ruff format check
        run: uvx ruff format --check --diff .
