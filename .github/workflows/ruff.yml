name: ruff

on:
  push:
  pull_request:
  workflow_call:

jobs:
  ruff:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Ruff check
        run: uvx ruff check --output-format=github .

      - name: Ruff format check
        run: uvx ruff format --check --diff .
