name: ruff

on: [push, pull_request]

jobs:
  ruff:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Ruff check
        run: uvx ruff check --output-format=github .

      - name: Ruff format check
        run: uvx ruff format --check --diff .
