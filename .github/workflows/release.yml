name: Release

on:
  release:
    types: [published]

jobs:
  tests:
    uses: ./.github/workflows/tests.yml

  ruff:
    uses: ./.github/workflows/ruff.yml

  publish:
    needs: [tests, ruff]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
