name: Release

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run test suite
        run: uv run pytest tests -v

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9

      - name: Run ruff check
        run: uvx ruff check .

      - name: Run ruff format --check
        run: uvx ruff format --check .

  publish:
    needs: [test, ruff]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
