name: tests

on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        # Version comes from .python-version; uv picks it up automatically.
        run: uv python install

      - name: Install the project
        run: uv sync --all-extras --dev --locked

      - name: Run tests
        run: uv run pytest

      - name: Run notebooks
        run: uv run pytest --nbval-lax --no-cov -n 0 -p no:randomly docs/notebooks/*.ipynb
